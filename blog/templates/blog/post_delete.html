{% extends 'blog/base.html' %}

{% block title %}Delete Post{% endblock %}

{% block content %}
    <div class="card mx-auto border-danger" style="max-width: 500px;">
        <div class="card-body text-center">
            <h3 class="text-danger">Delete Post?</h3>
            <p>Are you sure you want to delete <strong>{{ post.title }}</strong>?</p>
            <p class="text-muted">This action cannot be undone.</p>
            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger me-2">Yes, Delete</button>
                <a href="{% url 'post_detail' post.pk %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
{% endblock %}
